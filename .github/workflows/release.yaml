name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic version tag to publish or verify
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve dispatch tag
        if: github.event_name == 'workflow_dispatch'
        id: resolve_tag_dispatch
        run: echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Resolve pushed tag
        if: github.event_name == 'push'
        id: resolve_tag_push
        run: echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Skip non-semver tags
        id: semver
        env:
          TAG: ${{ steps.resolve_tag_dispatch.outputs.tag || steps.resolve_tag_push.outputs.tag }}
        run: |
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.semver.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.resolve_tag_dispatch.outputs.tag || steps.resolve_tag_push.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi
          if ! gh api "repos/$REPOSITORY/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag '$TAG' does not exist in '$REPOSITORY'" >&2
            exit 1
          fi
          gh release create "$TAG" --repo "$REPOSITORY" --title "$TAG" --generate-notes
